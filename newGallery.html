<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Michael Hommrich</title>
  <link rel="stylesheet" href="lightbox.min.css">
  <script src="https://kit.fontawesome.com/c8c0ccdea8.js" crossorigin="anonymous"></script>
  <script src="../JS/draft.js"></script>
  <script>
    lightbox.options ({
      'alwaysShowNavOnTouchDevices': false
    })
  </script>
</head>
<body>
  <header>
    <img src="../img/headshotCenter.jpg" alt="headshot">
    <H1>Michael Hommrich</H1>
    <button id="navIcon" onclick="expandNav()"><i class="fa-solid fa-bars"></i></button>
  </header>
  <section id="container">
    <h2>Photo Gallery</h2>
    <div>
      <a class="example-image-link" href="../img/headshotCenter.jpg" data-lightbox="example-set" data-title="My headshot"><img class="example-image" src="../img/headshotCenter.jpg" alt="image 1"/></a>
      <a class="example-image-link" href="../img/xmasCard.jpg" data-lightbox="example-set" data-title="My family"><img class="example-image" src="../img/xmasCard.jpg" alt="image 2" /></a>
      <a class="example-image-link" href="../img/squareDancePic.jpg" data-lightbox="example-set" data-title="One of my favorite dance pictures"><img class="example-image" src="../img/squareDancePic.jpg" alt="image 3" /></a>
      <a class="example-image-link" href="../img/MissaBrev.jpg" data-lightbox="example-set" data-title="One of my favorite performances, I am on the far right lifting my castmate"><img class="example-image" src="../img/MissaBrev.jpg" alt="image 4" /></a>
    </div>
  </section>
  <div id="hidden">
    <div id="active">
        <p id="text">Hover over image to see large version</p>
    </div>
    <div>
        <p id="alt"></p>
    </div>
    <div id="cont">
        <img src="../img/headshotCenter.jpg" alt="My headshot" class="gall" onmouseover="getBig(this)" onmouseout="getSmall()">
        <img src="../img/xmasCard.jpg" alt="My family" class="gall" onmouseover="getBig(this)" onmouseout="getSmall()">
        <img src="../img/squareDancePic.jpg" alt="My favorite dance picture" class="gall" onmouseover="getBig(this)" onmouseout="getSmall()">
        <img src="../img/MissaBrev.jpg" alt="One of my favorite performances, I'm on the far right lifting my castmate" class="gall" onmouseover="getBig(this)" onmouseout="getSmall()">
    </div>
</div>
